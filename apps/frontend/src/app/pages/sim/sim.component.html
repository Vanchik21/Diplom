@if (notFound()) {
  <div class="sim-not-found">
    <p>{{ 'sim.notFound' | translate }}</p>
  </div>
} @else if (module()) {
  <app-poe-workflow [module]="module()!">

    <div class="sim">
      <div class="sim__toolbar">
        <h2 class="sim__module-name">{{ entry()!.meta.name | localized }}</h2>
        <div class="sim__toolbar-actions">
          <button class="btn btn--ghost" (click)="togglePause()">
            {{ paused() ? '▶' : '⏸' }}
          </button>
          <button class="btn btn--ghost" (click)="onResetSim()">{{ 'sim.reset' | translate }}</button>
          @if (isAuthenticated()) {
            <button class="btn btn--primary" (click)="openSavePanel()">{{ 'sim.save' | translate }}</button>
          }
        </div>
      </div>

      <div class="sim__body">
        <div class="sim__viewport">
          <app-babylon-adapter
            [setupFn]="setupFn"
            [frameFn]="frameFn"
            [paused]="paused()"
          />
        </div>

        <aside class="sim__sidebar">
          <div class="sim__sidebar-section sim__sidebar-section--params">
            <app-param-panel
              [paramSpecs]="entry()!.meta.defaultParams"
              [initialValues]="currentParams()"
              (apply)="onApplyParams($event)"
              (resetSim)="onResetSim()"
            />
          </div>

          <div class="sim__sidebar-section sim__sidebar-section--formulas">
            <app-formula-panel [formulas]="entry()!.meta.formulas" />
          </div>
        </aside>
      </div>

      <div class="sim__bottom">
        <div class="sim__chart">
          <app-chart-panel [metrics]="metrics()" />
        </div>
        <div class="sim__metrics">
          <app-metrics-panel [metrics]="metrics()" />
        </div>
      </div>
    </div>

  </app-poe-workflow>

  @if (savePanelOpen()) {
    <div class="save-overlay" (click)="closeSavePanel()">
      <div class="save-dialog" (click)="$event.stopPropagation()">
        <h3 class="save-dialog__title">{{ 'scenarios.save' | translate }}</h3>
        <input
          class="save-dialog__input"
          type="text"
          [placeholder]="'scenarios.name' | translate"
          [value]="saveName()"
          (input)="onSaveNameInput($event)"
          (keydown.enter)="saveScenario()"
          autofocus
        />
        <div class="save-dialog__actions">
          <button class="btn btn--ghost" (click)="closeSavePanel()">{{ 'common.cancel' | translate }}</button>
          <button
            class="btn btn--primary"
            [disabled]="!saveName().trim() || saveStatus() === 'saving'"
            (click)="saveScenario()"
          >
            @switch (saveStatus()) {
              @case ('saving') { {{ 'common.loading' | translate }} }
              @case ('saved') { ✓ }
              @default { {{ 'common.save' | translate }} }
            }
          </button>
        </div>
        @if (saveStatus() === 'error') {
          <p class="save-dialog__error">{{ 'common.error' | translate }}</p>
        }
      </div>
    </div>
  }
}
