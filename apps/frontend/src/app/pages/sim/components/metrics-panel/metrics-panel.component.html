<div class="metrics-panel">
  <h3 class="metrics-panel__title">{{ 'sim.metrics' | translate }}</h3>

  <div class="metrics-panel__grid">
    @for (entry of scalarEntries; track entry.key) {
      <div class="metric">
        <span class="metric__key">{{ entry.key }}</span>
        <span class="metric__value">{{ entry.value | number: '1.3-3' }}</span>
      </div>
    }
  </div>
</div>
