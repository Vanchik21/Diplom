<div class="auth-page">
  <form class="auth-card" [formGroup]="form" (ngSubmit)="submit()">
    <h1 class="auth-card__title">{{ 'auth.login.title' | translate }}</h1>

    <div class="form-field">
      <label for="email">{{ 'auth.login.email' | translate }}</label>
      <input id="email" type="email" formControlName="email" autocomplete="email" />
    </div>

    <div class="form-field">
      <label for="password">{{ 'auth.login.password' | translate }}</label>
      <input id="password" type="password" formControlName="password" autocomplete="current-password" />
    </div>

    @if (error()) {
      <p class="error-message">{{ error()! | translate }}</p>
    }

    <button class="btn btn--primary auth-card__submit" type="submit" [disabled]="loading()">
      {{ loading() ? ('common.loading' | translate) : ('auth.login.submit' | translate) }}
    </button>

    <p class="auth-card__footer">
      {{ 'auth.login.noAccount' | translate }}
      <a routerLink="/register">{{ 'auth.login.registerLink' | translate }}</a>
    </p>
  </form>
</div>
