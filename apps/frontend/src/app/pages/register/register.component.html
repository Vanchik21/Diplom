<div class="auth-page">
  <form class="auth-card" [formGroup]="form" (ngSubmit)="submit()">
    <h1 class="auth-card__title">{{ 'auth.register.title' | translate }}</h1>

    <div class="form-field">
      <label for="email">{{ 'auth.register.email' | translate }}</label>
      <input id="email" type="email" formControlName="email" autocomplete="email" />
    </div>

    <div class="form-field">
      <label for="userName">{{ 'auth.register.userName' | translate }}</label>
      <input id="userName" type="text" formControlName="userName" autocomplete="username" />
    </div>

    <div class="form-field">
      <label for="password">{{ 'auth.register.password' | translate }}</label>
      <input id="password" type="password" formControlName="password" autocomplete="new-password" />
    </div>

    @if (error()) {
      <p class="error-message">{{ error()! | translate }}</p>
    }

    <button class="btn btn--primary auth-card__submit" type="submit" [disabled]="loading()">
      {{ loading() ? ('common.loading' | translate) : ('auth.register.submit' | translate) }}
    </button>

    <p class="auth-card__footer">
      {{ 'auth.register.hasAccount' | translate }}
      <a routerLink="/login">{{ 'auth.register.loginLink' | translate }}</a>
    </p>
  </form>
</div>
