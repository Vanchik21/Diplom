<header class="top-bar">
  <div class="top-bar__left">
    <button class="top-bar__menu-btn btn btn--ghost" (click)="layout.toggleSidebar()" aria-label="Toggle sidebar">
      ☰
    </button>
    <a class="top-bar__logo" routerLink="/">Physis&#8482;</a>
  </div>

  <nav class="top-bar__nav">
    <a class="btn btn--ghost" routerLink="/modules">{{ 'nav.modules' | translate }}</a>
    @if (auth.isAuthenticated()) {
      <a class="btn btn--ghost" routerLink="/my-scenarios">{{ 'nav.myScenarios' | translate }}</a>
    }
  </nav>

  <div class="top-bar__actions">
    <button
      class="btn btn--ghost top-bar__theme-btn"
      (click)="theme.toggle()"
      [attr.aria-label]="theme.current() === 'dark' ? 'Switch to light theme' : 'Switch to dark theme'"
      [title]="theme.current() === 'dark' ? 'Light theme' : 'Dark theme'"
    >
      @if (theme.current() === 'dark') {
        <svg class="top-bar__theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      } @else {
        <svg class="top-bar__theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      }
    </button>

    <button
      class="btn btn--ghost top-bar__lang"
      (click)="toggleLanguage()"
      [attr.aria-label]="currentLang === 'uk' ? 'Switch to English' : 'Перейти на українську'"
    >{{ langLabel }}</button>

    @if (auth.isAuthenticated()) {
      <app-notification-bell />
      <a class="btn btn--ghost" routerLink="/profile">{{ auth.currentUserName() }}</a>
      <button class="btn btn--ghost" (click)="auth.logout()">{{ 'nav.logout' | translate }}</button>
    } @else {
      <a class="btn btn--ghost" routerLink="/login">{{ 'nav.login' | translate }}</a>
      <a class="btn btn--primary" routerLink="/register">{{ 'nav.register' | translate }}</a>
    }
  </div>
</header>
