name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: backend (build + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4

      - name: setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: restore
        run: dotnet restore Physis.Api.csproj

      - name: build
        run: dotnet build Physis.Api.csproj --no-restore --configuration Release

      - name: unit tests
        run: dotnet test Physis.Api.Tests/Physis.Api.Tests.csproj --configuration Release --verbosity normal

  frontend:
    name: frontend (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: install dependencies
        run: npm ci

      - name: build
        run: npx ng build --configuration production
        working-directory: apps/frontend
